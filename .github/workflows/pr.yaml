        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"
          echo "Fetching configuration files from $BASE_REF branch to prevent malicious overrides..."

          # Fetch the target branch (base ref of the PR)
          git fetch origin "$BASE_REF:trusted-branch"

          # List of configuration files that should come from the trusted base branch
          config_files=(
            ".editorconfig"
            "Directory.Build.props"
            "Directory.Build.targets"
            "BannedSymbols.txt"
            "*.globalconfig"
            "*.ruleset"
          )

          # Copy each configuration file from the trusted branch if it exists
          for config_file in "${config_files[@]}"; do
            # Handle glob patterns
            if [[ "$config_file" == *"*"* ]]; then
              # Find files matching the pattern in main branch
              # Convert glob to proper regex: escape dots, then replace * with [^/]*
              pattern="${config_file//./\\.}"
              pattern="${pattern//\*/[^/]*}"
              git ls-tree -r --name-only trusted-branch | grep -E "^${pattern}$" | while read -r file; do
                if [ -n "$file" ]; then
                  echo "  ✓ Copying $file from $BASE_REF branch"
                  mkdir -p "$(dirname "$file")"
                  git show "trusted-branch:$file" > "$file" || echo "  ⚠️  Failed to copy $file"
                fi
              done
            else
              # Check if file exists in main branch
              if git cat-file -e "trusted-branch:$config_file" 2>/dev/null; then
                echo "  ✓ Copying $config_file from $BASE_REF branch"
                git show "trusted-branch:$config_file" > "$config_file"
              else
                echo "  ℹ️  $config_file not found in main branch, skipping"
              fi
            fi
          done

          echo ""
          echo "✅ Configuration files secured - using versions from $BASE_REF branch"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name:  Run .NET Framework tests (4.6.2 - 4.8.1)
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path './tests' -Recurse -Filter '*.csproj'

          if ($testProjects.Count -eq 0) {
            Write-Error "❌ No test projects found in ./tests directory!"
            exit 1
          }

          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host "Found test projects:" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          $testProjects | ForEach-Object { Write-Host $_.FullName -ForegroundColor White }
          Write-Host ""

          $frameworks = @('net462', 'net472', 'net48', 'net481')

          foreach ($testProj in $testProjects) {
            Write-Host "==========================================" -ForegroundColor Cyan
            Write-Host "Testing project: $($testProj.FullName)" -ForegroundColor Cyan
            Write-Host "==========================================" -ForegroundColor Cyan

            foreach ($fw in $frameworks) {
              Write-Host "Testing framework: $fw" -ForegroundColor Yellow

              dotnet test $testProj.FullName `
                --configuration Release `
                --framework $fw `
                --logger "console;verbosity=normal"

              if ($LASTEXITCODE -ne 0) {
                Write-Error "Tests failed for $fw in $($testProj.Name)"
                exit 1
              }
            }
            Write-Host ""
          }

          Write-Host ""
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "✅ ALL STAGES PASSED" -ForegroundColor Green
          Write-Host "==========================================" -ForegroundColor Green
          Write-Host "Stage 1: Linux tests + 90% coverage ✅" -ForegroundColor Green
          Write-Host "Stage 2: Windows & macOS tests ✅" -ForegroundColor Green
          Write-Host "Stage 3: .NET Framework 4.x tests ✅" -ForegroundColor Green
          Write-Host ""
          Write-Host "PR is ready to merge! 🎉" -ForegroundColor Green

  # ============================================================================
  # Security Scan (Runs in parallel with tests)
  # ============================================================================
  security-scan:
    name: "Security Scan (DevSkim)"
    runs-on: ubuntu-latest
    if: github.repository != 'Chris-Wolfgang/repo-template'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch trusted configuration files from base branch
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref || 'main' }}"
          echo "Fetching configuration files from $BASE_REF branch to prevent malicious overrides..."

          # Fetch the target branch (base ref of the PR)
          git fetch origin "$BASE_REF:trusted-branch"

          # List of configuration files that should come from the trusted base branch
          config_files=(
            ".editorconfig"
            "Directory.Build.props"
            "Directory.Build.targets"
            "BannedSymbols.txt"
            "*.globalconfig"
            "*.ruleset"
          )

          # Copy each configuration file from the trusted branch if it exists
          for config_file in "${config_files[@]}"; do
            # Handle glob patterns
            if [[ "$config_file" == *"*"* ]]; then
              # Find files matching the pattern in main branch
              # Convert glob to proper regex: escape dots, then replace * with [^/]*
              pattern="${config_file//./\\.}"
              pattern="${pattern//\*/[^/]*}"
              git ls-tree -r --name-only trusted-branch | grep -E "^${pattern}$" | while read -r file; do
                if [ -n "$file" ]; then
                  echo "  ✓ Copying $file from $BASE_REF branch"
                  mkdir -p "$(dirname "$file")"
                  git show "trusted-branch:$file" > "$file" || echo "  ⚠️  Failed to copy $file"
                fi
              done
            else
              # Check if file exists in main branch
              if git cat-file -e "trusted-branch:$config_file" 2>/dev/null; then
                echo "  ✓ Copying $config_file from $BASE_REF branch"
                git show "trusted-branch:$config_file" > "$config_file"
              else
                echo "  ℹ️  $config_file not found in main branch, skipping"
              fi
            fi
          done

          echo ""
          echo "✅ Configuration files secured - using versions from $BASE_REF branch"

      - name: Install DevSkim CLI
        run: dotnet tool install --global Microsoft.CST.DevSkim.CLI

      - name: Run DevSkim security scan
        run: |
          devskim analyze \
            --source-code . \
            --file-format text \
            --output-file devskim-results.txt \
            --ignore-rule-ids DS176209 \
            --ignore-globs "**/api/**,**/CoverageReport/**,**/TestResults/**"

      - name: Display security scan results
        if: always()
        run: |
          if [ -f devskim-results.txt ]; then
            echo "=========================================="
            echo "DevSkim Security Scan Results"
            echo "=========================================="
            cat devskim-results.txt
            echo ""

            if grep -qi "error\|critical\|high" devskim-results.txt; then
              echo "❌ Security issues detected - review required"
              exit 1
            else
              echo "✅ No critical security issues found"
            fi
          else
            echo "✅ No security issues found"
          fi

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devskim-results
          path: devskim-results.txt
          if-no-files-found: warn
